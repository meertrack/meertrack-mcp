# fly.toml app configuration file generated for meertrack-mcp on 2026-04-23T15:39:34-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'meertrack-mcp'
primary_region = 'iad'

[build]

[env]
  MEERTRACK_MCP_PRM_URL = 'https://mcp.meertrack.com/.well-known/oauth-protected-resource'
  MEERTRACK_MCP_PUBLIC_HOST = 'mcp.meertrack.com'
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
