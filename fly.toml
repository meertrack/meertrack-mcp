# Fly.io app config for the Meertrack MCP wrapper.
#
# Initial deploy: `fly launch --ha=false --smoke-checks=false`.
# `--smoke-checks=false` is required — Fly's smoke prober sends a non-MCP
# request that a Streamable HTTP server will reject, failing the deploy.
#
# Multi-tenant: bearers are forwarded per-request from clients. DO NOT set
# `FLY_MCP_BEARER_TOKEN` as a secret — the MCP layer holds no token of its own.

app = "meertrack-mcp"
primary_region = "sjc"

[build]

[env]
  PORT = "3001"
  # Pin the public host so the PRM document and `WWW-Authenticate` header
  # advertise the correct URL even before requests arrive.
  MEERTRACK_MCP_PUBLIC_HOST = "mcp.meertrack.com"
  MEERTRACK_MCP_PRM_URL = "https://mcp.meertrack.com/.well-known/oauth-protected-resource"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
