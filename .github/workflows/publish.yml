name: Publish

# Triggered on tags like v1.2.3. We deliberately don't trigger on every push to
# main — npm publishes are intentional, gated by tag.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: npm publish (with provenance)
    runs-on: ubuntu-latest
    # `id-token: write` is required for npm provenance attestation. The npm
    # package handles bearer tokens, so attesting the artifact came from this
    # repo's CI matters. Provenance does NOT work with legacy npm tokens —
    # use a granular access token or trusted publisher config.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$tag) does not match package.json version $pkg"
            exit 1
          fi

      - name: Version sync (package.json ↔ server.json)
        run: npm run check:version-sync

      - name: Changelog entry exists for this version
        run: npm run check:changelog

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
